# This workflow will update dependencies for product-is.
name: Dependency Updater
on:
  workflow_dispatch:
  schedule:
    # Everyday at 15:00 UTC (8.30 PM SL time)
    - cron:  '0 15 * * *'

env:
  MAVEN_OPTS: -Xmx4g -Xms1g -XX:+HeapDumpOnOutOfMemoryError
  REPOSITORY: product-is
  GIT_USERNAME: jenkins-is-staging
  GIT_EMAIL: jenkins-is-staging@wso2.com
  PRODUCT_REPOSITORY_FORKED: $GIT_USERNAME'/'${REPOSITORY}
  REMOTE_PRODUCT_REPOSITORY_PUBLIC: wso2/$REPOSITORY
  PRODUCT_REPOSITORY_PUBLIC: wso2/$REPOSITORY
  BUILD_NUMBER: ${{github.run_id}}
  DEPENDENCY_UPGRADE_BRANCH_NAME: IS_dependency_updater_github_action/$BUILD_NUMBER
  PR: "https://github.com/wso2/product-is/pulls"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Adopt JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "adopt"
      - name: Check $JAVA_HOME
        run: |
          echo $JAVA_HOME
      - name: Cache local Maven repository
        id: cache-maven-m2
        uses: actions/cache@v4
        env:
          cache-name: cache-m2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ env.cache-name }}-
            ${{ runner.os }}-maven-
            ${{ runner.os }}-
      - name: Clone Repository
        id: builder_step
        run: |
          echo "REPO_NAME=${{ env.REPOSITORY }}" >> "$GITHUB_OUTPUT"
          echo "Starting dependency upgrade"
          echo "=========================================================="
          echo "Clean up any existing files"
          echo "=========================================================="
          rm -rf ${{ env.REPOSITORY }}
          echo "Cloning: https://github.com/'${{ env.PRODUCT_REPOSITORY_FORKED }}"
          echo "=========================================================="
          git clone 'https://github.com/'${{ env.PRODUCT_REPOSITORY_FORKED }}'.git'
          cd ${{ env.REPOSITORY }}
          echo 'Add remote: '${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }} 'as https://github.com/'${{ env.PRODUCT_REPOSITORY_PUBLIC }}
          echo "=========================================================="
          git remote add ${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }} 'https://@github.com/'${{ env.PRODUCT_REPOSITORY_PUBLIC }}
          echo "Fetching: ${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }}"
          echo "=========================================================="
          git fetch ${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }}
          echo "Checking out: ${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }} master branch"
          echo "=========================================================="
          git checkout -b ${{ env.DEPENDENCY_UPGRADE_BRANCH_NAME }} ${{ env.REMOTE_PRODUCT_REPOSITORY_PUBLIC }}'/master'

      - name: Update Dependencies
        working-directory: ${{ env.REPOSITORY }}
        run: |
          echo "Updating dependencies"
          echo "=========================================================="
          mvn versions:update-properties -U -DgenerateBackupPoms=false -DallowMajorUpdates=false -DallowMinorUpdates=false -Dincludes=org.wso2.carbon.identity.*,org.wso2.carbon.extension.identity.*,org.wso2.identity.*,org.wso2.carbon.consent.*,org.wso2.carbon.healthcheck.*,org.wso2.carbon.utils,org.wso2.charon,org.apache.rampart.wso2,org.apache.ws.security.wso2,org.wso2.carbon.identity.framework:*,org.wso2.carbon.multitenancy:*,org.wso2.carbon.registry:* -Dexcludes=org.wso2.carbon.extension.identity.authenticator.utils
          echo "Available updates"
          echo "=========================================================="
          git diff --color > dependency_updates.diff
          cat dependency_updates.diff

      - name: Build
        working-directory: ${{ env.REPOSITORY }}
        run: |
          echo "Building project"
          echo "=========================================================="
          mvn clean install -DskipTests | tee mvn-build.log
          PR_BUILD_STATUS=$(cat mvn-build.log | grep "\[INFO\] BUILD" | grep -oE '[^ ]+$')
          PR_BUILD_FINAL_RESULT=$(
            echo "==========================================================="
            echo "product-is BUILD $PR_BUILD_STATUS"
            echo "=========================================================="
          )
          PR_BUILD_RESULT_LOG_TEMP=$(echo "$PR_BUILD_FINAL_RESULT" | sed 's/$/%0A/')
          PR_BUILD_RESULT_LOG=$(echo $PR_BUILD_RESULT_LOG_TEMP)
          echo "::warning::$PR_BUILD_RESULT_LOG"
          PR_BUILD_SUCCESS_COUNT=$(grep -o -i "\[INFO\] BUILD SUCCESS" mvn-build.log | wc -l)
          if [ "$PR_BUILD_SUCCESS_COUNT" != "1" ]; then
            echo "PR BUILD not successfull. Aborting."
            echo "::error::PR BUILD not successfull. Check artifacts for logs."
            exit 1
          fi

      - name: Prepare jstack diagnostic directory
        run: |
          mkdir -p ${{ github.workspace }}/jstack-dumps
          # ──────────────────────────────────────────────────────────────
          # jstack sampler script
          #
          # Runs in the background during integration tests. Every 5
          # seconds it looks for WSO2 Carbon server processes (identified
          # by the wso2carbon.log.file system property in their cmdline)
          # and captures a thread dump from each.
          #
          # Dumps are written to per-PID files with timestamps so you
          # can correlate them with the "Starting WSO2 Carbon" /
          # "WSO2 Carbon started in X sec" log lines.
          #
          # The script automatically detects NEW server PIDs across
          # restarts and tracks which ones it has already seen.
          # ──────────────────────────────────────────────────────────────
          cat > ${{ github.workspace }}/jstack-sampler.sh << 'SAMPLER_EOF'
          #!/bin/bash
          DUMP_DIR="$1"
          INTERVAL=10                # seconds between samples
          CAPTURE_WINDOW=240         # only capture first 4 min after discovering a PID
          MAX_DUMPS_PER_PID=25       # hard cap: ~25 dumps × 75KB ≈ 1.9MB per PID

          declare -A PID_FIRST_SEEN  # timestamp when PID was first discovered
          declare -A PID_DUMP_COUNT  # number of dumps taken for this PID

          while true; do
            CARBON_PIDS=$(ps aux | grep -E 'wso2carbon\.log\.file|org\.wso2\.carbon\.launcher|carbon\.home' | grep -v grep | awk '{print $2}')
            NOW=$(date +%s)

            for PID in $CARBON_PIDS; do
              if [ "$PID" = "$$" ]; then
                continue
              fi

              TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
              DUMP_FILE="${DUMP_DIR}/jstack-pid${PID}.log"

              # First time seeing this PID
              if [ -z "${PID_FIRST_SEEN[$PID]}" ]; then
                PID_FIRST_SEEN[$PID]=$NOW
                PID_DUMP_COUNT[$PID]=0
                echo "[${TIMESTAMP}] Discovered new Carbon server PID: ${PID}" >> "${DUMP_DIR}/sampler.log"
              fi

              # Skip if we've exceeded the capture window or dump cap
              ELAPSED=$(( NOW - PID_FIRST_SEEN[$PID] ))
              if [ "$ELAPSED" -gt "$CAPTURE_WINDOW" ]; then
                continue
              fi
              if [ "${PID_DUMP_COUNT[$PID]}" -ge "$MAX_DUMPS_PER_PID" ]; then
                continue
              fi

              # Capture thread dump
              echo "" >> "$DUMP_FILE"
              echo "========== jstack ${PID} at ${TIMESTAMP} (elapsed=${ELAPSED}s, dump=#${PID_DUMP_COUNT[$PID]}) ==========" >> "$DUMP_FILE"
              jstack "$PID" >> "$DUMP_FILE" 2>&1
              PID_DUMP_COUNT[$PID]=$(( PID_DUMP_COUNT[$PID] + 1 ))
            done

            sleep $INTERVAL
          done
          SAMPLER_EOF
          chmod +x ${{ github.workspace }}/jstack-sampler.sh

      - name: Run Integration Tests
        working-directory: ${{ env.REPOSITORY }}
        run: |
          echo "Running integration tests with jstack sampler"
          echo "=========================================================="

          # Start the jstack sampler in the background
          bash ${{ github.workspace }}/jstack-sampler.sh "${{ github.workspace }}/jstack-dumps" &
          SAMPLER_PID=$!
          echo "jstack sampler started as PID: ${SAMPLER_PID}"

          cd modules/integration/tests-integration/tests-backend
          mvn clean install -Dmaven.test.failure.ignore=false | tee mvn-test.log

          # Stop the sampler
          kill $SAMPLER_PID 2>/dev/null || true
          wait $SAMPLER_PID 2>/dev/null || true
          echo "jstack sampler stopped"

          PR_TEST_STATUS=$(cat mvn-test.log | grep "\[INFO\] BUILD" | grep -oE '[^ ]+$')
          PR_TEST_RESULT=$(sed -n -e '/\[INFO\] Results:/,/\[INFO\] Tests run:/ p' mvn-test.log)
          PR_BUILD_FINAL_RESULT=$(
            echo "==========================================================="
            echo "product-is TESTS $PR_TEST_STATUS"
            echo "=========================================================="
            echo ""
            echo "$PR_TEST_RESULT"
          )
          PR_BUILD_RESULT_LOG_TEMP=$(echo "$PR_BUILD_FINAL_RESULT" | sed 's/$/%0A/')
          PR_BUILD_RESULT_LOG=$(echo $PR_BUILD_RESULT_LOG_TEMP)
          echo "::warning::$PR_BUILD_RESULT_LOG"
          PR_TEST_SUCCESS_COUNT=$(grep -o -i "\[INFO\] BUILD SUCCESS" mvn-test.log | wc -l)
          if [ "$PR_TEST_SUCCESS_COUNT" != "17" ]; then
            echo "Integration tests not successfull. Aborting."
            echo "::error::Integration tests not successfull. Check artifacts for logs."
            exit 1
          fi

      - name: Summarize jstack diagnostics
        if: always()
        run: |
          echo "=========================================================="
          echo "jstack Sampler Summary"
          echo "=========================================================="
          DUMP_DIR="${{ github.workspace }}/jstack-dumps"

          # Show sampler discovery log
          if [ -f "${DUMP_DIR}/sampler.log" ]; then
            echo "── Server PID discovery log ──"
            cat "${DUMP_DIR}/sampler.log"
            echo ""
          else
            echo "WARNING: No sampler.log found — sampler may not have detected any Carbon server processes."
            echo "Check that the process grep pattern matches the actual WSO2 server command line."
            echo ""
          fi

          # Summary per PID
          for f in "${DUMP_DIR}"/jstack-pid*.log; do
            [ -f "$f" ] || continue
            PID=$(echo "$f" | sed 's/.*pid\([0-9]*\).*/\1/')
            DUMP_COUNT=$(grep -c '========== jstack' "$f" 2>/dev/null || echo 0)
            FIRST_TS=$(grep '========== jstack' "$f" | head -1 | sed 's/.*at \(.*\) =.*/\1/')
            LAST_TS=$(grep '========== jstack' "$f" | tail -1 | sed 's/.*at \(.*\) =.*/\1/')
            echo "── PID ${PID}: ${DUMP_COUNT} dumps from ${FIRST_TS} to ${LAST_TS} ──"

            # Show the most common thread states across all dumps for this PID.
            # This reveals what the server spends most of its time doing.
            echo "  Top 10 most frequent thread states:"
            grep -A1 '^"' "$f" \
              | grep 'java.lang.Thread.State' \
              | sort | uniq -c | sort -rn | head -10 \
              | sed 's/^/    /'
            echo ""

            # Show the most common stack frames — the real gold.
            # If a thread is blocked on the same call across many dumps,
            # it will dominate this list.
            echo "  Top 15 most frequent stack frames (excluding common ones):"
            grep '^\tat ' "$f" \
              | grep -v -E 'java\.lang\.Object\.wait|java\.lang\.Thread\.sleep|sun\.misc\.Unsafe\.park|jdk\.internal\.misc\.Unsafe\.park|java\.util\.concurrent\.locks' \
              | sort | uniq -c | sort -rn | head -15 \
              | sed 's/^/    /'
            echo ""
          done

      - name: Commit and Push Changes
        working-directory: ${{ env.REPOSITORY }}
        run: |
          if [ -s dependency_updates.diff ]; then
            echo "Committing changes"
            echo "=========================================================="
            git config --global user.email ${{ env.GIT_EMAIL }}
            git config --global user.name ${{ env.GIT_USERNAME }}
            git commit -a -m 'Bump dependencies from '${{ env.DEPENDENCY_UPGRADE_BRANCH_NAME }}
            git remote rm origin
            git remote add origin 'https://'${{ secrets.PAT }}'@github.com/'${{ env.PRODUCT_REPOSITORY_FORKED }}
            echo "Pushing changes"
            echo "=========================================================="
            git push -u origin ${{ env.DEPENDENCY_UPGRADE_BRANCH_NAME }}
          else
            echo "There are no dependency updates available"
            echo "=========================================================="
            exit 0
          fi

      - name: Send Pull Request
        working-directory: ${{ env.REPOSITORY }}
        run: |
          if [ -s dependency_updates.diff ]; then
            echo "Sending Pull Request"
            echo "=========================================================="
            TITLE="Bump Dependencies #"${{ env.BUILD_NUMBER }}
            RESPONSE=$(curl -s -w "%{http_code}" -k -X \
            POST https://api.github.com/repos/${{ env.PRODUCT_REPOSITORY_PUBLIC }}/pulls \
            -H "Authorization: Bearer "${{ secrets.PAT }}"" \
            -H "Content-Type: application/json" \
            -d '{ "title": "'"${TITLE}"'","body": "Bumps dependencies for product-is. Link : https://github.com/wso2/product-is/actions/runs/${{github.run_id}}","head": "'"${{ env.GIT_USERNAME }}:${{ env.DEPENDENCY_UPGRADE_BRANCH_NAME }}"'","base":"master"}')
            RESPONSE_BODY=${RESPONSE::-3}
            STATUS=$(printf "%s" "$RESPONSE" | tail -c 3)
            if [[ $STATUS == "201" ]]; then
              echo "PR=$(echo $RESPONSE_BODY | jq -r '.html_url')" >> $GITHUB_ENV
            fi
          fi
      - name: Archive dependency diff file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-updates-diff
          path: |
            ${{steps.builder_step.outputs.REPO_NAME}}/dependency_updates.diff
      - name: Archive maven-build-log file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvn-build.log
          path: |
            ${{steps.builder_step.outputs.REPO_NAME}}/mvn-build.log
          if-no-files-found: warn
      - name: Archive maven-test-log file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvn-test.log
          path: |
            ${{steps.builder_step.outputs.REPO_NAME}}/modules/integration/tests-integration/tests-backend/mvn-test.log
          if-no-files-found: warn
      - name: Archive jstack diagnostic dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jstack-dumps
          path: |
            ${{ github.workspace }}/jstack-dumps/
          if-no-files-found: warn
      - name: Archive heap dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heap-dump
          path: |
            **/**.hprof
          if-no-files-found: ignore
      - name: Google Chat Notification
        run: |
          STATUS_COLOR=$(if [[ ${{ job.status }} == "success" ]];then echo "#009944";
          elif [[ ${{ job.status }} = "failure" ]];then echo "#ff0000";
          elif [[ ${{ job.status }} = "cancelled" ]];then echo "#ffc300"; fi)

          curl --location --request POST '${{ secrets.GOOGLE_CHAT_WEBHOOK }}' \
          --header 'Content-Type: application/json' \
          --data-raw '{
              "cards": [
                  {
                      "header": {
                          "title": "Dependency Updater",
                          "subtitle": "GitHub Action #${{ env.BUILD_NUMBER }}"
                      },
                      "sections": [
                          {
                              "widgets": [
                                  {
                                      "textParagraph": {
                                          "text": "Status: <br><b><font color='"${STATUS_COLOR}"'>${{ job.status }}</font></b></br>"
                                      }
                                  },
                                  {
                                      "keyValue": {
                                          "topLabel": "Build Job:",
                                          "content": "GitHub Action",
                                          "contentMultiline": "false",
                                          "bottomLabel": "",
                                          "button": {
                                              "textButton": {
                                                  "text": "VIEW",
                                                  "onClick": {
                                                      "openLink": {
                                                          "url": "https://github.com/wso2/product-is/actions/runs/${{github.run_id}}"
                                                      }
                                                  }
                                              }
                                          }
                                      }
                                  },
                                  {
                                      "keyValue": {
                                          "topLabel": "Pull Request:",
                                          "content": "Check Pull Request",
                                          "contentMultiline": "false",
                                          "bottomLabel": "",
                                          "button": {
                                              "textButton": {
                                                  "text": "VIEW",
                                                  "onClick": {
                                                      "openLink": {
                                                          "url": "'${{ env.PR }}'"
                                                      }
                                                  }
                                              }
                                          }
                                      }
                                  }
                              ]
                          }
                      ]
                  }
              ]
          }'
        if: always()
